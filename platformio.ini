; PlatformIO configuration for La-Z-Boy BLE Controller
;
; NOTE: You still need to apply the NimBLE patch!
;       See patches/README.md for details.
;
; Build:   pio run
; Upload:  pio run --target upload
; Monitor: pio device monitor

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    h2zero/NimBLE-Arduino@^2.3.0
    knolleary/PubSubClient@^2.8

board_build.partitions = default.csv
